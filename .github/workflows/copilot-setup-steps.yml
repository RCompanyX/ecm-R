name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: windows-2022
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  submodules: recursive

            - name: Set up MSBuild
              uses: microsoft/setup-msbuild@v2

            - name: Generate Visual Studio solution
              shell: pwsh
              run: .\generate.bat

            - name: Verify generated solution
              shell: pwsh
              run: |
                  if (-not (Test-Path "build/ECM-R.sln")) {
                      throw "Expected build/ECM-R.sln to exist after running generate.bat."
                  }
